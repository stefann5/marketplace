<div class="flex min-h-screen">
  <aside class="w-64 bg-surface-0 border-r border-surface-200 flex flex-col">
    <div class="p-4 border-b border-surface-200">
      <span class="text-xl font-bold text-primary cursor-pointer" routerLink="/">Marketplace</span>
    </div>
    <nav class="flex flex-col gap-1 p-3 flex-1">
      <a routerLink="/dashboard/products" routerLinkActive="bg-primary/10 text-primary"
         class="flex items-center gap-3 px-3 py-2 rounded text-content no-underline font-medium hover:bg-surface-100 transition-colors">
        <i class="pi pi-box"></i>
        Products
      </a>
      <a routerLink="/dashboard/orders" routerLinkActive="bg-primary/10 text-primary"
         class="flex items-center gap-3 px-3 py-2 rounded text-content no-underline font-medium hover:bg-surface-100 transition-colors">
        <i class="pi pi-shopping-bag"></i>
        Orders
      </a>
    </nav>
    <div class="p-3 border-t border-surface-200">
      <p-button label="Logout" icon="pi pi-sign-out" [text]="true" styleClass="w-full" (onClick)="logout()" />
    </div>
  </aside>
  <main class="flex-1 bg-ground">
    <router-outlet />
  </main>
</div>
