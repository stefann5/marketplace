<nav class="flex items-center gap-4 bg-surface-0 border-b border-surface-200 px-4 py-2">
  <div class="flex items-center gap-3 shrink-0">
    <p-button icon="pi pi-bars" [text]="true" [rounded]="true" (onClick)="toggleDrawer()" class="flex" />
    <span class="text-xl font-bold cursor-pointer text-primary leading-none" (click)="goHome()">{{ brandLabel || 'Marketplace' }}</span>
  </div>

  <div class="flex-1">
    <p-iconfield class="w-full">
      <p-inputicon class="pi pi-search" />
      <input type="text" pInputText placeholder="Search" class="w-full"
        [(ngModel)]="searchQuery" (keydown.enter)="onSearch()" />
    </p-iconfield>
  </div>

  @if (isInSellerShop()) {
    <p-button label="Back to Marketplace" icon="pi pi-arrow-left" [text]="true" (onClick)="goToMarketplace()" />
  }

  <div class="shrink-0">
    @if (loggedIn) {
      <div class="flex items-center gap-2">
        @if (userRole === 'SELLER') {
          <p-button label="Dashboard" icon="pi pi-th-large" [text]="true" routerLink="/dashboard/products" />
        }
        @if (userRole === 'ADMIN') {
          <p-button label="Admin" icon="pi pi-shield" [text]="true" routerLink="/admin/sellers" />
        }
        @if (userRole === 'BUYER') {
          <p-button icon="pi pi-sparkles" label="AI Chat" [text]="true" routerLink="/chat" />
          <p-button icon="pi pi-list" label="Orders" [text]="true" routerLink="/orders" />
          <p-button (onClick)="goToCart()" [text]="true" [rounded]="true" styleClass="relative !overflow-visible mr-2">
            <i class="pi pi-shopping-cart text-xl"></i>
            @if (cartItemCount > 0) {
              <p-badge [value]="'' + cartItemCount" severity="danger"
                styleClass="absolute" [style]="{ top: '-0.5rem', right: '-0.5rem' }" />
            }
          </p-button>
        }
        <p-button label="Logout" icon="pi pi-sign-out" [outlined]="true" (onClick)="logout()" />
      </div>
    } @else {
      <p-button label="Login" icon="pi pi-sign-in" [outlined]="true" (onClick)="goToLogin()" />
    }
  </div>
</nav>

<p-drawer [visible]="drawerVisible" (visibleChange)="onDrawerVisibleChange($event)" header="Categories" position="left" styleClass="w-80">
  <p-tree [value]="categoryNodes" [filter]="true" filterPlaceholder="Filter categories"
    selectionMode="single" (onNodeSelect)="onCategorySelect($event)" />
</p-drawer>
