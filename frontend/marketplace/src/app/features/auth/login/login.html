<p-toast />

<div class="flex align-items-center justify-content-center min-h-screen surface-ground">
  <p-card class="w-full max-w-30rem">
    <ng-template #header>
      <div class="text-center p-4 pb-0">
        <h2 class="text-2xl font-bold m-0">Login</h2>
        <p class="text-color-secondary mt-2">Sign in to your account</p>
      </div>
    </ng-template>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-column gap-4 p-2">
      <div>
        <p-floatlabel variant="on">
          <input pInputText id="email" formControlName="email" class="w-full" />
          <label for="email">Email</label>
        </p-floatlabel>
        @if (loginForm.get('email')?.invalid && loginForm.get('email')?.touched) {
          <small class="text-red-500 mt-1 block">A valid email is required.</small>
        }
      </div>

      <div>
        <p-floatlabel variant="on">
          <p-password inputId="password" formControlName="password" [toggleMask]="true" [feedback]="false" fluid />
          <label for="password">Password</label>
        </p-floatlabel>
        @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
          <small class="text-red-500 mt-1 block">Password is required.</small>
        }
      </div>

      <p-button label="Sign In" type="submit" styleClass="w-full" [disabled]="loginForm.invalid || loading" [loading]="loading" />
    </form>

    <ng-template #footer>
      <div class="text-center">
        <span class="text-color-secondary">Don't have an account? </span>
        <a routerLink="/register" class="text-primary font-semibold no-underline cursor-pointer">Register</a>
      </div>
    </ng-template>
  </p-card>
</div>
