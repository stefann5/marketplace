@if (product) {
  <div class="surface-ground min-h-screen p-4">
    <div class="max-w-60rem mx-auto">
      <p-button icon="pi pi-arrow-left" label="Back to Products" [text]="true" (onClick)="goBack()" class="mb-4" />

      <div class="surface-card rounded-lg p-5">
        <div class="grid grid-cols-12 gap-6">
          <div class="col-span-12 md:col-span-5">
            <div class="flex justify-center align-items-center bg-surface-50 rounded-lg p-4" style="min-height: 300px">
              @if (product.imageUrl) {
                <img [src]="product.imageUrl" [alt]="product.name" class="rounded max-w-full max-h-20rem object-contain" />
              } @else {
                <i class="pi pi-image text-8xl text-color-secondary"></i>
              }
            </div>
          </div>

          <div class="col-span-12 md:col-span-7">
            <div class="flex flex-column gap-3">
              <h1 class="text-3xl font-bold text-color m-0">{{ product.name }}</h1>

              <div class="flex align-items-center gap-3">
                <div class="flex align-items-center gap-1">
                  <i class="pi pi-star-fill text-yellow-500"></i>
                  <span class="font-semibold">{{ product.averageRating | number:'1.1-1' }}</span>
                  <span class="text-color-secondary">({{ product.reviewCount }} reviews)</span>
                </div>
                <span class="text-color-secondary">·</span>
                <span class="text-color-secondary">{{ product.purchaseCount }} sold</span>
              </div>

              <span class="text-4xl font-bold text-primary">{{ product.price | currency:'USD' }}</span>

              <p-tag [value]="getStockLabel(product.stock)" [severity]="getStockSeverity(product.stock)" class="w-fit" />

              <p class="text-color-secondary line-height-3 mt-2">{{ product.description }}</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
}
