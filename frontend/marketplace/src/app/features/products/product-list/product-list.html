<div class="surface-ground min-h-screen p-4">
  <div class="max-w-80rem mx-auto">
    <h2 class="text-3xl font-bold text-color mb-4">Products</h2>

    <p-dataview [value]="products" [paginator]="true" [rows]="rows" [totalRecords]="totalRecords"
                [lazy]="true" (onLazyLoad)="onPageChange($event)" [first]="first" layout="grid">
      <ng-template #grid let-items>
        <div class="grid grid-cols-12 gap-4">
          @for (product of items; track product.id) {
            <div class="col-span-12 sm:col-span-6 md:col-span-4 xl:col-span-3 p-2">
              <div class="border border-surface-200 surface-card rounded-lg flex flex-column cursor-pointer hover:shadow-2 transition-all transition-duration-200"
                   style="height: 360px" (click)="viewProduct(product.id)">
                <div class="flex justify-center align-items-center p-4 bg-surface-50 rounded-t-lg" style="height: 200px; overflow: hidden">
                  @if (product.imageUrl) {
                    <img [src]="product.imageUrl" [alt]="product.name" class="rounded object-contain" style="max-height: 100%; max-width: 100%" />
                  } @else {
                    <div class="flex align-items-center justify-content-center w-full text-color-secondary">
                      <i class="pi pi-image text-6xl"></i>
                    </div>
                  }
                </div>
                <div class="p-4">
                  <div class="flex justify-content-between align-items-start mb-2">
                    <span class="text-lg font-semibold text-color line-clamp-1">{{ product.name }}</span>
                    <p-tag [value]="getStockLabel(product.stock)" [severity]="getStockSeverity(product.stock)" />
                  </div>
                  <p class="text-color-secondary text-sm line-clamp-2 mt-1 mb-3">{{ product.description }}</p>
                  <div class="flex justify-content-between align-items-center">
                    <span class="text-xl font-bold text-primary">{{ product.price | currency:'USD' }}</span>
                    <div class="flex align-items-center gap-1">
                      <i class="pi pi-star-fill text-yellow-500 text-sm"></i>
                      <span class="text-sm text-color-secondary">{{ product.averageRating | number:'1.1-1' }}</span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          }
        </div>
      </ng-template>
    </p-dataview>
  </div>
</div>
