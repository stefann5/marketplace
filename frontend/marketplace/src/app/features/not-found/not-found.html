<div class="bg-ground min-h-screen flex items-center justify-center p-4">
  <div class="bg-surface-0 rounded-lg border border-surface-200 p-8 text-center max-w-[30rem] w-full">
    <i class="pi pi-compass text-6xl text-primary mb-4"></i>
    <h1 class="text-5xl font-bold m-0 mb-2">404</h1>
    <p class="text-xl mb-1">Page not found</p>
    <p class="text-muted mb-6">The page you are looking for does not exist or has been moved.</p>
    <div class="flex items-center justify-center gap-2">
      <p-button label="Go Back" icon="pi pi-arrow-left" [outlined]="true" (onClick)="goBack()" />
      <p-button label="Go Home" icon="pi pi-home" (onClick)="goHome()" />
    </div>
  </div>
</div>
