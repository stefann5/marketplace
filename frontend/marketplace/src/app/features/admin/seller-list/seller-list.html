<div class="p-6">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-2xl font-bold m-0">Seller Management</h1>
    <p-select [options]="statusOptions" [(ngModel)]="selectedStatus" optionLabel="label" optionValue="value"
      placeholder="Filter by status" (onChange)="onStatusFilterChange()" class="w-48" />
  </div>

  <p-table [value]="sellers" [loading]="loading" [paginator]="true" [rows]="10"
    [rowsPerPageOptions]="[10, 20, 50]" styleClass="p-datatable-striped">
    <ng-template #header>
      <tr>
        <th>Company</th>
        <th>Email</th>
        <th>Phone</th>
        <th>Status</th>
        <th>Created</th>
        <th style="width: 6rem">Actions</th>
      </tr>
    </ng-template>
    <ng-template #body let-seller>
      <tr>
        <td class="font-medium">{{ seller.companyName }}</td>
        <td>{{ seller.contactEmail }}</td>
        <td>{{ seller.contactPhone }}</td>
        <td>
          <p-tag [value]="getStatusLabel(seller.status)" [severity]="getStatusSeverity(seller.status)" />
        </td>
        <td>{{ seller.createdAt | date:'mediumDate' }}</td>
        <td>
          <p-button icon="pi pi-eye" [rounded]="true" [text]="true" (onClick)="viewDetail(seller)" />
        </td>
      </tr>
    </ng-template>
    <ng-template #emptymessage>
      <tr>
        <td colspan="6" class="text-center text-muted py-8">No sellers found.</td>
      </tr>
    </ng-template>
  </p-table>
</div>
