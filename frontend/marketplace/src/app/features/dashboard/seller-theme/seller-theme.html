<p-toast />

<div class="p-6">
  <h1 class="text-2xl font-bold mb-6">Shop Theme</h1>

  @if (loading) {
    <div class="flex items-center justify-center p-12">
      <i class="pi pi-spin pi-spinner text-4xl"></i>
    </div>
  } @else {
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <p-card>
        <ng-template #header>
          <div class="p-4 pb-0">
            <h3 class="text-lg font-semibold m-0">Theme Settings</h3>
            <p class="text-muted text-sm mt-1">Customize your shop appearance</p>
          </div>
        </ng-template>
        <div class="flex flex-col gap-5">
          <div>
            <label class="block text-sm font-medium mb-2">Preset</label>
            <p-select [options]="presetOptions" [(ngModel)]="theme.preset" optionLabel="label" optionValue="value"
              (onChange)="onPresetChange()" class="w-full" />
          </div>

          <div>
            <label class="block text-sm font-medium mb-2">Primary Color</label>
            <p-select [options]="colorOptions" [(ngModel)]="theme.primaryColor" optionLabel="label" optionValue="value"
              (onChange)="onColorChange()" class="w-full" placeholder="Default (Amber)" [showClear]="true" />
          </div>
        </div>
      </p-card>

      <p-card>
        <ng-template #header>
          <div class="p-4 pb-0">
            <h3 class="text-lg font-semibold m-0">Preview</h3>
          </div>
        </ng-template>
        <div class="flex flex-col gap-4">
          <div class="flex gap-2">
            <p-button label="Primary" />
            <p-button label="Secondary" severity="secondary" />
            <p-button label="Success" severity="success" />
          </div>
          <div class="p-4 bg-primary/10 rounded">
            <p class="font-semibold text-primary m-0">This is how your shop accent will look</p>
            <p class="text-muted text-sm mt-1">Buyers will see this color scheme when visiting your shop page.</p>
          </div>
        </div>
      </p-card>
    </div>

    <div class="mt-6">
      <p-button label="Save Theme" icon="pi pi-save" [loading]="saving" (click)="save()" />
    </div>
  }
</div>
