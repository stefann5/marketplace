<p-toast />
<p-confirmdialog />

<div class="bg-ground min-h-screen p-4">
  <div class="max-w-[80rem] mx-auto">
    <div class="flex justify-between items-center mb-4">
      <h2 class="text-3xl font-bold text-content m-0">My Products</h2>
      <p-button label="Add Product" icon="pi pi-plus" (onClick)="addProduct()" />
    </div>

    <div class="bg-surface-0 rounded-lg">
      <p-table [value]="products" [paginator]="true" [rows]="rows" [totalRecords]="totalRecords"
               [lazy]="true" (onLazyLoad)="onPageChange($event)" [loading]="loading"
               [tableStyle]="{'min-width': '50rem'}">
        <ng-template #header>
          <tr>
            <th style="width: 80px">Image</th>
            <th>Name</th>
            <th style="width: 160px">Category</th>
            <th style="width: 120px">Price</th>
            <th style="width: 100px">Stock</th>
            <th style="width: 140px">Actions</th>
          </tr>
        </ng-template>
        <ng-template #body let-product>
          <tr>
            <td>
              @if (product.imageUrls.length) {
                <img [src]="product.imageUrls[0]" [alt]="product.name" width="50" height="50"
                     style="object-fit: cover; border-radius: 6px" />
              } @else {
                <div class="flex items-center justify-center" style="width: 50px; height: 50px; border-radius: 6px; background: var(--p-surface-100)">
                  <i class="pi pi-image text-muted"></i>
                </div>
              }
            </td>
            <td class="font-semibold">{{ product.name }}</td>
            <td>{{ getCategoryName(product.categoryId) }}</td>
            <td>{{ product.price | currency:'USD' }}</td>
            <td>{{ product.stock }}</td>
            <td>
              <div class="flex gap-2">
                <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" (onClick)="editProduct(product.id)" />
                <p-button icon="pi pi-trash" [rounded]="true" [text]="true" severity="danger" (onClick)="confirmDelete($event, product)" />
              </div>
            </td>
          </tr>
        </ng-template>
        <ng-template #emptymessage>
          <tr>
            <td colspan="6" class="text-center p-4 text-muted">
              No products yet. Click "Add Product" to create your first listing.
            </td>
          </tr>
        </ng-template>
      </p-table>
    </div>
  </div>
</div>
