services:
  fake-smtp:
    image: eclipse-temurin:21-jre
    container_name: fake-smtp
    command: ["java", "-jar", "/opt/fake-smtp/fake-smtp-server-2.4.1.jar"]
    environment:
      FAKESMTP_PORT: 2525
    volumes:
      - ./tools/fake-smtp-server-2.4.1.jar:/opt/fake-smtp/fake-smtp-server-2.4.1.jar:ro
    ports:
      - "2525:2525"
      - "5080:8080"
    networks:
      - internal

  auth-service:
    build: ./auth-service
    environment:
      DB_URL: jdbc:postgresql://host.docker.internal:5432/auth_db
      DB_USER: postgres
      DB_PASS: admin
      JWT_SECRET: dev-secret-key-minimum-256-bits-long-replace-in-production-env
      SELLER_SERVICE_URL: http://seller-service:8084
      SMTP_HOST: fake-smtp
      SMTP_PORT: 2525
      SMTP_AUTH: false
      SMTP_STARTTLS: false
      MAIL_FROM: no-reply@marketplace.local
    depends_on:
      - fake-smtp
      - seller-service
    networks:
      - internal

  rabbitmq:
    image: rabbitmq:4-management-alpine
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - internal

  mongodb:
    image: mongo:8.0
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - internal

  catalog-service:
    build: ./catalog-service
    environment:
      DB_URL: jdbc:postgresql://host.docker.internal:5432/catalog_db
      DB_USER: postgres
      DB_PASS: admin
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: product-images
      ORDER_SERVICE_URL: http://order-service:8083
      AUTH_SERVICE_URL: http://auth-service:8081
      SELLER_SERVICE_URL: http://seller-service:8084
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
    depends_on:
      - minio
      - rabbitmq
    networks:
      - internal

  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    networks:
      - internal

  order-service:
    build: ./order-service
    environment:
      DB_URL: jdbc:postgresql://host.docker.internal:5432/order_db
      DB_USER: postgres
      DB_PASS: admin
      CATALOG_SERVICE_URL: http://catalog-service:8082
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
    depends_on:
      - catalog-service
      - rabbitmq
    networks:
      - internal

  seller-service:
    build: ./seller-service
    environment:
      DB_URL: jdbc:postgresql://host.docker.internal:5432/seller_db
      DB_USER: postgres
      DB_PASS: admin
      MINIO_ENDPOINT: http://minio:9000
      MINIO_PUBLIC_URL: http://localhost:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: seller-documents
      AUTH_SERVICE_URL: http://auth-service:8081
    depends_on:
      - minio
    networks:
      - internal

  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    environment:
      JWT_SECRET: dev-secret-key-minimum-256-bits-long-replace-in-production-env
      AUTH_SERVICE_URL: http://auth-service:8081
      CATALOG_SERVICE_URL: http://catalog-service:8082
      ORDER_SERVICE_URL: http://order-service:8083
      SELLER_SERVICE_URL: http://seller-service:8084
      ANALYTICS_SERVICE_URL: http://analytics-service:8085
      CHAT_SERVICE_URL: http://chat-service:8086
    depends_on:
      - auth-service
      - catalog-service
      - order-service
      - seller-service
      - analytics-service
      - chat-service
    networks:
      - internal

  analytics-service:
    build: ./analytics-service
    environment:
      MONGODB_URI: mongodb://mongodb:27017/analytics_db
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: guest
      RABBITMQ_PASS: guest
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - internal

  chat-service:
    build: ./chat-service
    env_file:
      - ./chat-service/.env
    volumes:
      - hf-cache:/hf-cache
    depends_on:
      - catalog-service
      - mongodb
    networks:
      - internal

volumes:
  minio-data:
  rabbitmq-data:
  mongodb-data:
  hf-cache:

networks:
  internal:
