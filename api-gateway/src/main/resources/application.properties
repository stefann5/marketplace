server.port=8080

jwt.secret=${JWT_SECRET:dev-secret-key-minimum-256-bits-long-replace-in-production-env}

spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URL:http://localhost:8081}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

spring.cloud.gateway.routes[1].id=catalog-service
spring.cloud.gateway.routes[1].uri=${CATALOG_SERVICE_URL:http://localhost:8082}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/products/**,/api/categories/**,/api/reviews/**

spring.cloud.gateway.routes[2].id=order-service
spring.cloud.gateway.routes[2].uri=${ORDER_SERVICE_URL:http://localhost:8083}
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/cart/**,/api/orders/**

spring.cloud.gateway.routes[3].id=seller-service
spring.cloud.gateway.routes[3].uri=${SELLER_SERVICE_URL:http://localhost:8084}
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/sellers/**,/api/admin/sellers/**

spring.cloud.gateway.routes[4].id=analytics-service
spring.cloud.gateway.routes[4].uri=${ANALYTICS_SERVICE_URL:http://localhost:8085}
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/analytics/**

spring.cloud.gateway.routes[5].id=chat-service
spring.cloud.gateway.routes[5].uri=${CHAT_SERVICE_URL:http://localhost:8086}
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/chat/**
