server.port=8081

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/auth_db}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:admin}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

jwt.secret=${JWT_SECRET:dev-secret-key-minimum-256-bits-long-replace-in-production-env}
jwt.access-expiry-ms=900000
jwt.refresh-expiry-ms=604800000

seller.service.url=${SELLER_SERVICE_URL:http://localhost:8084}
